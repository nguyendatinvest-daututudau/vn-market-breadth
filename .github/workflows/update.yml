name: Update market breadth data

on:
  schedule:
    # 04:30 UTC = 11:30 giờ VN (sau phiên sáng)
    - cron: "30 4 * * 1-5"
    # 08:10 UTC = 15:10 giờ VN (sau giờ đóng cửa)
    - cron: "10 8 * * 1-5"
  workflow_dispatch: {}   # Cho phép chạy thủ công

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Restore OHLC cache
        uses: actions/cache@v4
        with:
          path: data/ohlc_cache
          key: ohlc-cache-v1-${{ hashFiles('scripts/**/*.py', '.github/workflows/update.yml') }}
          restore-keys: |
            ohlc-cache-v1-

      - name: Run fetch + compute
        env:
          SSI_CONSUMER_ID: ${{ secrets.SSI_CONSUMER_ID }}
          SSI_CONSUMER_SECRET: ${{ secrets.SSI_CONSUMER_SECRET }}
        run: python scripts/fetch_and_compute.py

      - name: Generate dashboard.html (embedded data)
        run: python scripts/embed_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --cached --quiet || git commit -m "chore: update market breadth data $(date -u +'%Y-%m-%d')"
          git push
