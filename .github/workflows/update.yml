name: Update market breadth data

on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'
      - 'docs/**'
  schedule:
    # 08:10 UTC = 15:10 gio VN (sau gio dong cua)
    - cron: "10 8 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-market-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Restore OHLC cache
        uses: actions/cache@v4
        with:
          path: data/ohlc_cache
          key: ohlc-cache-v2-${{ hashFiles('scripts/**/*.py', '.github/workflows/update.yml') }}
          restore-keys: |
            ohlc-cache-v2-

      - name: Validate SSI secrets
        run: |
          test -n "$SSI_CONSUMER_ID"
          test -n "$SSI_CONSUMER_SECRET"
        env:
          SSI_CONSUMER_ID: ${{ secrets.SSI_CONSUMER_ID }}
          SSI_CONSUMER_SECRET: ${{ secrets.SSI_CONSUMER_SECRET }}

      - name: Run fetch + compute
        run: python scripts/fetch_and_compute.py
        env:
          SSI_CONSUMER_ID: ${{ secrets.SSI_CONSUMER_ID }}
          SSI_CONSUMER_SECRET: ${{ secrets.SSI_CONSUMER_SECRET }}

      - name: Generate dashboard.html (embedded data)
        run: python scripts/embed_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: update market breadth data $(date -u +'%Y-%m-%d')"
            git push
          fi
