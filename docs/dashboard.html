  .market-tabs button{

    background:transparent; border:none; padding:7px 16px; border-radius:999px; cursor:pointer;
    transition:all .15s ease;
  }
  .market-tabs button:hover{color:var(--accent-1); background:var(--panel-tint);}
  .market-tabs button.active{background:var(--accent-grad); color:#fff; box-shadow:0 4px 12px rgba(79,70,229,0.3);}

  .panel{background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:18px; margin-bottom:12px; box-shadow:var(--shadow-sm);}
  .panel h2{font-family:var(--font-all); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:0.05em; color:#3A4270; margin-bottom:12px; display:flex; align-items:center; gap:8px;}

  .kpi-card{border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;background:var(--panel);}

  .kpi-card.down .num{color:var(--down);}
  .kpi-card.primary .num{color:var(--accent-1);}

  .summary-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
  .summary-badges{display:flex;gap:6px;flex-wrap:wrap;}

  .s-badge.wat{background:rgba(245,165,36,0.14);color:#B9760F;border-color:rgba(245,165,36,0.25);}

  .s-badge.ens{background:rgba(6,182,212,0.10);color:var(--accent-2);border-color:rgba(6,182,212,0.2);}
  .s-badge.ensw{background:rgba(128,128,128,0.10);color:var(--muted);border-color:rgba(128,128,128,0.2);}
  .s-badge.active{opacity:1;box-shadow:0 0 0 2px var(--accent-1);}
  .summary-count{font-family:var(--font-all);font-size:14px;font-weight:600;color:var(--text);}

  .action-card.watch{border-color:rgba(245,165,36,0.28);background:linear-gradient(180deg,rgba(245,165,36,0.10),#fff 60%);}
  .action-card.sell{border-color:rgba(240,71,62,0.25);background:linear-gradient(180deg,rgba(240,71,62,0.08),#fff 60%);}
  .action-card.neutral{border-color:rgba(79,70,229,0.18);background:linear-gradient(180deg,rgba(79,70,229,0.06),#fff 60%);}
  .action-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
  .action-title{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);font-weight:700;}
  .action-num{font-size:24px;font-weight:800;line-height:1;color:var(--text);}

  .mini-symbol.buy{color:var(--up);border-color:rgba(15,174,114,0.20);}
  .mini-symbol.watch{color:#B9760F;border-color:rgba(245,165,36,0.25);}

  .btn-copy:hover{background:var(--accent-1);color:#fff;border-color:var(--accent-1);}

function adRatioNote(r){
  if (r === null) return '';
  if (r >= 1.5) return 'Tiền lan tỏa rộng';
  if (r >= 1.2) return 'Tiền lan tỏa tốt';
  if (r >= 1.0) return 'Nghiêng tăng';
  if (r >= 0.8) return 'Cân bằng';
  return 'Bán áp đảo';
}

// --- Build summary badges from all strategies ---
function buildSummary(dateStr){
  let strongCount = 0, watchCount = 0, preCount = 0, ensStrong = 0, ensWeak = 0;
  let lmStrong = 0, lmValid = 0, lmWatch = 0, lmSell = 0;
  let symbols = new Set();

  let momSrc, stratSrc, ensSrc, lmSrc;
  if (dateStr && SIGNALS_HISTORY) {
    const entry = SIGNALS_HISTORY.find(h => h.date === dateStr);
    if (entry) { momSrc = entry.momentum; stratSrc = entry.strategy; ensSrc = entry.ensemble; lmSrc = entry.luc_mach; }
  } else {
    momSrc = MOMENTUM; stratSrc = SIGNALS; ensSrc = ENSEMBLE; lmSrc = LUC_MACH;
  }

  if (momSrc && momSrc.all_signals) {
    momSrc.all_signals.forEach(s => {
      symbols.add(s.symbol);
      if (s.signal_type === 'strong') strongCount++;
      else if (s.signal_type === 'watch') watchCount++;
    });
  }
  if (stratSrc && stratSrc.all_signals) {
    stratSrc.all_signals.forEach(s => {
      symbols.add(s.symbol);
      preCount++;
    });
  }
  if (ensSrc && ensSrc.all_signals) {
    ensSrc.all_signals.forEach(s => {
      symbols.add(s.symbol);
      if (s.total_score >= 0.65) ensStrong++;
      else if (s.total_score >= 0.35) ensWeak++;
    });
  }
  if (lmSrc && lmSrc.all_signals) {
    lmSrc.all_signals.forEach(s => {
      symbols.add(s.symbol);
      if (s.status === 'STRONG_BUY') lmStrong++;
      else if (s.status === 'VALID_BUY') lmValid++;
      else if (s.status === 'WATCHLIST') lmWatch++;
      else if (s.status === 'SELL_WARNING') lmSell++;
    });
  }

  let badges = [];
  if (strongCount) badges.push({cls:'str', label:`🟢 Strong ${strongCount}`, filter:'strong'});
  if (watchCount) badges.push({cls:'wat', label:`🟡 Watch ${watchCount}`, filter:'watch'});
  if (preCount) badges.push({cls:'pre', label:`🔵 Pre-Breakout ${preCount}`, filter:'pre-breakout'});
  if (ensStrong) badges.push({cls:'ens', label:`🟣 Ensemble ${ensStrong}`, filter:'ensemble-strong'});
  if (ensWeak) badges.push({cls:'ensw', label:`⚪ Ensemble ${ensWeak}`, filter:'ensemble-weak'});
  if (lmStrong) badges.push({cls:'str', label:`🟢 LM Strong ${lmStrong}`, filter:'luc-mach-strong'});
  if (lmValid) badges.push({cls:'ens', label:`✅ LM Valid ${lmValid}`, filter:'luc-mach-valid'});
  if (lmWatch) badges.push({cls:'wat', label:`👀 LM Watch ${lmWatch}`, filter:'luc-mach-watch'});
  if (lmSell) badges.push({cls:'ensw', label:`🔴 LM Sell ${lmSell}`, filter:'luc-mach-sell'});

  const buySignals = strongCount + preCount + ensStrong + ensWeak + lmStrong + lmValid;
  const watchSignals = watchCount + lmWatch;
  const sellWarnings = lmSell;
  const missingOhlc = lmSrc?.skipped_missing_ohlc || 0;
  return { totalSignals: buySignals+watchSignals+sellWarnings, uniqueSymbols: symbols.size, badges, buySignals, watchSignals, sellWarnings, missingOhlc };
}

function currentSignalSources(dateStr){
  if (dateStr && SIGNALS_HISTORY) {
    const entry = SIGNALS_HISTORY.find(h => h.date === dateStr);
    if (entry) return { mom: entry.momentum, strat: entry.strategy, ens: entry.ensemble, lm: entry.luc_mach };
  }
  return { mom: MOMENTUM, strat: SIGNALS, ens: ENSEMBLE, lm: LUC_MACH };
}

function topSymbols(rows, kind, limit=8){
  return rows.filter(r => {
    if (kind === 'buy') return r.signalType === 'strong' || r.signalType === 'valid' || r.signalType === 'moderate' || r.signalType === 'weak';
    if (kind === 'watch') return r.signalType === 'watch';
    if (kind === 'sell') return r.signalType === 'sell_warning';
    return true;
  }).slice(0, limit).map(r => `<span class="mini-symbol ${kind}">${r.symbol}</span>`).join('') || '<span class="empty-note">Không có</span>';
}

function buildActionBoard(summary){
  const rows = collectAllSignals(activeSignalDate);
  const buyList = topSymbols(rows, 'buy', 10);
  const watchList = topSymbols(rows, 'watch', 10);
  const sellList = topSymbols(rows, 'sell', 10);
  const m = LATEST?.markets?.[activeMarket];
  const marketNote = m ? `${adRatioNote(m.ad_ratio)} · MA20 ${fmt1(m.pct_above_ma20)}% · MA50 ${fmt1(m.pct_above_ma50)}%` : '';
  return `<div class="action-grid">
    <div class="action-card buy">
      <div class="action-head"><div><div class="action-title">Buy candidates</div><div class="action-note">Ưu tiên kiểm tra điểm mua</div></div><div class="action-num">${summary.buySignals}</div></div>
      <div class="action-list">${buyList}</div>
    </div>
    <div class="action-card watch">
      <div class="action-head"><div><div class="action-title">Watchlist</div><div class="action-note">Đổi trạng thái, chờ xác nhận</div></div><div class="action-num">${summary.watchSignals}</div></div>
      <div class="action-list">${watchList}</div>
    </div>
    <div class="action-card sell">
      <div class="action-head"><div><div class="action-title">Sell warning</div><div class="action-note">Cần rà lại vị thế đang nắm</div></div><div class="action-num">${summary.sellWarnings}</div></div>
      <div class="action-list">${sellList}</div>
    </div>
    <div class="action-card neutral">
      <div class="action-head"><div><div class="action-title">Market context</div><div class="action-note">${marketNote}</div></div><div class="action-num">${m?.ad_ratio ?? '—'}</div></div>
      <div class="action-note">${summary.missingOhlc ? `Còn thiếu OHLCV ${summary.missingOhlc} mã trong Lục Mạch.` : 'OHLCV đủ cho tập Lục Mạch hiện tại.'}</div>
    </div>
  </div>`;
}

// --- Unified signal table ---
function buildSignalHub(dateStr){
  let rows = collectAllSignals(dateStr);
  if (!rows.length) return '<div class="note" style="margin-bottom:0;">Chưa có tín hiệu cho ngày này.</div>';

  // Get previous signals for repeat detection
  let prevSymbols = new Set();
  if (SIGNALS_HISTORY && SIGNALS_HISTORY.length >= 2) {
    const prev = SIGNALS_HISTORY[SIGNALS_HISTORY.length - 2];
    if (prev) {
      (prev.strategy?.all_signals || []).forEach(s => prevSymbols.add(s.symbol));
      (prev.ensemble?.all_signals || []).forEach(s => prevSymbols.add(s.symbol));
      (prev.momentum?.all_signals || []).forEach(s => prevSymbols.add(s.symbol));
      (prev.luc_mach?.all_signals || []).forEach(s => prevSymbols.add(s.symbol));
    }
  }

  // Load momentum backtest win rates
  let wrStrong = MOMENTUM_BT?.stats?.['strong_T+5']?.win_rate;
  let wrWatch = MOMENTUM_BT?.stats?.['watch_T+5']?.win_rate;

  rows = rows.map(r => {
    let repeat = prevSymbols.has(r.symbol) ? '<span class="badge-repeat">🔥 Lặp</span>' : '';
    return { ...r, repeat };
  });

  let tbody = applyFilters(rows, activeFilter, searchQuery).map(r => {
    let typeTag = '', winrateStr = '';
    if (r.source === 'momentum') {
      if (r.signalType === 'strong') { typeTag = '<span class="tag str">Strong</span>'; winrateStr = wrStrong ? `<span class="winrate">~${(wrStrong*100).toFixed(0)}%</span>` : ''; }
      else { typeTag = '<span class="tag wat">Watch</span>'; winrateStr = wrWatch ? `<span class="winrate">~${(wrWatch*100).toFixed(0)}%</span>` : ''; }
    } else if (r.source === 'pre-breakout') {
      typeTag = r.score >= 75 ? '<span class="tag str">Mạnh</span>' : '<span class="tag wat">TB</span>';
    } else if (r.source === 'ensemble') {
      typeTag = r.signalType === 'strong' ? '<span class="tag ens">Strong</span>' : '<span class="tag ens-w">Weak</span>';
    } else if (r.source === 'luc-mach') {
      if (r.signalType === 'strong') typeTag = '<span class="tag str">LM Strong</span>';
      else if (r.signalType === 'valid') typeTag = '<span class="tag ens">LM Valid</span>';
      else if (r.signalType === 'watch') typeTag = '<span class="tag wat">LM Watch</span>';
      else typeTag = '<span class="tag ens-w">LM Sell</span>';
    }

    let srcTags = r.strategies.map(s => {
      const cls = {hy:'hy',ma:'ma',breakout:'bo',darvas:'bo',roc_momentum:'roc',roc:'roc',pullback:'pb',ma_crossover:'ma',luc_mach:'hy',tplus:'ma',sell_warning:'ens-w'}[s] || '';
      return `<span class="src-tag ${cls}">${s.replace('_momentum','').replace('_crossover','').toUpperCase()}</span>`;
    }).join('');

    let expl = r.expl || '';

    return `<tr>
      <td class="mono" style="font-weight:700;">${r.symbol}${r.repeat}</td>
      <td class="mono" style="font-weight:700;">${r.score}</td>
      <td>${typeTag}${winrateStr}</td>
      <td><div class="sig-expl">${expl}</div></td>
      <td><div class="sig-source">${srcTags}</div></td>
      <td class="mono">${r.rsi ?? '\u2014'}</td>
      <td class="mono">${r.adx ?? '\u2014'}</td>
      <td class="mono">${r.vol ?? '\u2014'}</td>
      <td class="mono">${r.price ?? '\u2014'}</td>
    </tr>`;
  }).join('');

  if (!tbody) return '<div class="note" style="margin-bottom:0;">Không có tín hiệu phù hợp.</div>';

  return `<table>
    <thead><tr>
      <th>Mã</th><th>Score</th><th>Loại</th><th>Chi tiết</th><th>Nguồn</th><th>RSI</th><th>ADX</th><th>Vol</th><th>Giá</th>
    </tr></thead>
    <tbody>${tbody}</tbody>
  </table>`;
}

let activeSignalDate = null; // null = hom nay

function collectAllSignals(dateStr){
  if (dateStr && SIGNALS_HISTORY) {
    const entry = SIGNALS_HISTORY.find(h => h.date === dateStr);
    if (entry) return _collectSignals(entry.momentum, entry.strategy, entry.ensemble, entry.luc_mach);
    return [];
  }
  return _collectSignals(MOMENTUM, SIGNALS, ENSEMBLE, LUC_MACH);
}

function _collectSignals(momSrc, stratSrc, ensSrc, lmSrc){
  let result = [];
  // Momentum signals
  if (momSrc && momSrc.all_signals) {
    momSrc.all_signals.forEach(s => {
      let strats = s.strategies || [];
      let bonusLabels = {vol_surge:'Vol2x', adx_strong:'ADX>28', rsi_gold:'RSI\u2605'};
      let bonusStr = (s.bonuses||[]).map(b => bonusLabels[b]||b).join('+');
      let parts = strats.map(st => {
        const labels = {ma_crossover:'MA10>MA50', breakout:'Close>H20', roc_momentum:'ROC>ROC20', hybrid:'HY'};
        return labels[st] || st;
      });
      if (bonusStr) parts.push(bonusStr);
      let expl = parts.join(' + ');
      let adxV = s.adx14 != null ? s.adx14.toFixed(1) : null;
      if (s.adx14 != null && (s.bonuses||[]).includes('adx_strong')) expl += ` ADX${adxV}`;
      result.push({
        symbol: s.symbol, score: s.score,
        signalType: s.signal_type, source: 'momentum',
        strategies: strats, expl: expl,
        rsi: s.rsi14 != null ? s.rsi14.toFixed(1) : null,
        adx: s.adx14 != null ? s.adx14.toFixed(1) : null,
        vol: s.vol_ratio != null ? s.vol_ratio.toFixed(1)+'x' : null,
        price: s.last_price ? s.last_price.toLocaleString('vi-VN') : null,
      });
    });
  }
  // Pre-breakout signals
  if (stratSrc && stratSrc.all_signals) {
    stratSrc.all_signals.forEach(s => {
      let expl = `Base ${s.base_score?.toFixed(0)||'?'}% OBV ${s.obv_score?.toFixed(0)||'?'}% Grad ${s.vol_gradient > 0 ? '+' : ''}${(s.vol_gradient||0).toFixed(2)}`;
      result.push({
        symbol: s.symbol, score: s.composite_score,
        signalType: s.composite_score >= 75 ? 'strong' : 'moderate',
        source: 'pre-breakout',
        strategies: ['pre-breakout'], expl: expl,
        rsi: null, adx: null, vol: s.vol_ratio != null ? s.vol_ratio.toFixed(2) : null,
        price: s.last_price ? s.last_price.toLocaleString('vi-VN') : null,
      });
    });
  }
  // Ensemble signals
  if (ensSrc && ensSrc.all_signals) {
    ensSrc.all_signals.forEach(s => {
      let strats = [];
      if (s.ma_crossover) strats.push('ma_crossover');
      if (s.pullback) strats.push('pullback');
      if (s.breakout) strats.push('breakout');
      if (s.momentum) strats.push('roc');
      let expl = strats.map(st => {
        const labels = {ma_crossover:'MA10>MA50', pullback:'Pullback MA50', breakout:'Breakout', roc:'ROC>ROC20'};
        return labels[st] || st;
      }).join(' + ');
      let pct = (s.total_score * 100).toFixed(0);
      result.push({
        symbol: s.symbol, score: pct,
        signalType: s.total_score >= 0.65 ? 'strong' : 'weak',
        source: 'ensemble',
        strategies: strats, expl: expl,
        rsi: s.rsi14 != null ? s.rsi14.toFixed(1) : null,
        adx: null, vol: s.vol_ratio != null ? s.vol_ratio.toFixed(1)+'x' : null,
        price: s.last_price ? s.last_price.toLocaleString('vi-VN') : null,
      });
    });
  }
  // Luc Mach signals
  if (lmSrc && lmSrc.all_signals) {
    lmSrc.all_signals.forEach(s => {
      let parts = [];
      if (s.buy_score != null) parts.push(`BuyScore ${s.buy_score}/6`);
      if (s.luc_mach_buy) parts.push('LucMach');
      if (s.pullback_buy) parts.push('Pullback MA20');
      if (s.breakout_buy) parts.push('Breakout20');
      if (s.trend_up_strong) parts.push('Trend mạnh');
      else if (s.trend_up_basic) parts.push('Trend OK');
      if (s.sell_warning) parts.push('Sell warning');
      if (s.vol_ratio != null) parts.push(`Vol ${s.vol_ratio.toFixed(1)}x`);
      result.push({
        symbol: s.symbol, score: s.score,
        signalType: s.signal_type, source: 'luc-mach',
        strategies: s.strategies || [], expl: parts.join(' + '),
        rsi: null, adx: null,
        vol: s.vol_ratio != null ? s.vol_ratio.toFixed(1)+'x' : null,
        price: s.last_price ? s.last_price.toLocaleString('vi-VN') : null,
      });
    });
  }
  // Sort by score desc
  result.sort((a, b) => b.score - a.score);
  return result;
}

function applyFilters(rows, filter, query){
  return rows.filter(r => {
    if (filter !== 'all') {
      if (filter === 'buy' && (r.signalType === 'watch' || r.signalType === 'sell_warning')) return false;
      if (filter === 'strong' && r.signalType !== 'strong') return false;
      if (filter === 'watch' && !((r.source === 'momentum' && r.signalType === 'watch') || (r.source === 'luc-mach' && r.signalType === 'watch'))) return false;
      if (filter === 'sell-warning' && r.signalType !== 'sell_warning') return false;
      if (filter === 'pre-breakout' && r.source !== 'pre-breakout') return false;
      if (filter === 'ensemble-strong' && !(r.source === 'ensemble' && r.signalType === 'strong')) return false;
      if (filter === 'ensemble-weak' && !(r.source === 'ensemble' && r.signalType === 'weak')) return false;
      if (filter === 'luc-mach-strong' && !(r.source === 'luc-mach' && r.signalType === 'strong')) return false;
      if (filter === 'luc-mach-valid' && !(r.source === 'luc-mach' && r.signalType === 'valid')) return false;
      if (filter === 'luc-mach-watch' && !(r.source === 'luc-mach' && r.signalType === 'watch')) return false;
      if (filter === 'luc-mach-sell' && !(r.source === 'luc-mach' && r.signalType === 'sell_warning')) return false;
    }
    if (query && !r.symbol.includes(query)) return false;
    return true;
  });
}

function toggleAccordion(el){

function renderBreadthChart(m){
  if (!m) return;
  const cv = document.getElementById('breadthChart'), tt = document.getElementById('chartTooltip'), wr = document.getElementById('chartWrap');
  if (!cv || !tt || !wr) return;
  const pts = ((HISTORY||[]).map(h => { const k = h.markets[activeMarket]; return k && k.pct_above_ma20 != null ? { date: h.date, v20: k.pct_above_ma20, v50: k.pct_above_ma50, v200: k.pct_above_ma200 } : null; }).filter(Boolean));
  if (pts.length < 2) { wr.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--faint);font-size:12px;">Chưa đủ dữ liệu lịch sử.</div>'; return; }
  pts.sort((a,b) => { const da = a.date.split('/'), db = b.date.split('/'); return da[2]-db[2] || da[1]-db[1] || da[0]-db[0]; });
  const dpr = window.devicePixelRatio || 1, w = wr.clientWidth || 600, h = 260;
  cv.width = w * dpr; cv.height = h * dpr; cv.style.width = w + 'px'; cv.style.height = h + 'px';
  const ctx = cv.getContext('2d'); ctx.scale(dpr, dpr);
  const P = { t: 30, r: 14, b: 38, l: 44 }, cw = w - P.l - P.r, ch = h - P.t - P.b;
  const xp = i => P.l + (i / (pts.length - 1)) * cw, yp = v => P.t + ch - (v / 100) * ch;
  const lines = [{ k: 'v20', c: '#4F46E5', l: 'MA20' }, { k: 'v50', c: '#F5A524', l: 'MA50' }, { k: 'v200', c: '#06B6D4', l: 'MA200' }];
  function drw(idx){
    ctx.clearRect(0, 0, w, h);
    [0, 25, 50, 75, 100].forEach(pct => {
      const y = yp(pct);
      ctx.save(); ctx.strokeStyle = '#E4E9F7'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.moveTo(P.l, y); ctx.lineTo(w - P.r, y); ctx.stroke(); ctx.restore();
      ctx.fillStyle = '#6B7395'; ctx.font = '9.5px Inter,sans-serif';
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle'; ctx.fillText(pct + '%', P.l - 6, y);
    });
    lines.forEach(s => {
      ctx.strokeStyle = s.c; ctx.lineWidth = 2.5; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
      ctx.beginPath(); pts.forEach((p, i) => { const x = xp(i), y = yp(p[s.k]); i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
      ctx.stroke();
      const lx = xp(pts.length - 1), ly = yp(pts[pts.length - 1][s.k]);
      ctx.fillStyle = '#fff'; ctx.strokeStyle = s.c; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(lx, ly, 4, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    });
    ctx.fillStyle = '#6B7395'; ctx.font = '9px Inter,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    const step = Math.max(1, Math.floor(pts.length / Math.max(1, Math.floor(cw / 50))));
    pts.forEach((p, i) => { if (i % step === 0 || i === pts.length - 1) { const d = p.date.split('/'); ctx.fillText(d[0] + '/' + d[1], xp(i), h - P.b + 8); } });
    ctx.strokeStyle = '#E4E9F7'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(P.l, h - P.b); ctx.lineTo(w - P.r, h - P.b); ctx.stroke();
    lines.forEach((s, i) => {
      const lx = P.l + i * 100, ly = 14;
      ctx.strokeStyle = s.c; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx + 18, ly); ctx.stroke();
      ctx.fillStyle = '#3A4270'; ctx.font = '10px Inter,sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle'; ctx.fillText(s.l, lx + 24, ly);
    });
    if (idx >= 0 && idx < pts.length) {
      const p = pts[idx], x = xp(idx);
      ctx.save(); ctx.strokeStyle = 'rgba(27,33,64,0.15)'; ctx.lineWidth = 1; ctx.setLineDash([3, 4]);
      ctx.beginPath(); ctx.moveTo(x, P.t); ctx.lineTo(x, P.t + ch); ctx.stroke(); ctx.restore();
      lines.forEach(s => { const dy = yp(p[s.k]); ctx.fillStyle = '#fff'; ctx.strokeStyle = s.c; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.arc(x, dy, 5, 0, Math.PI * 2); ctx.fill(); ctx.stroke(); });
      tt.style.display = 'block';
      tt.innerHTML = `<div style="font-weight:600;margin-bottom:4px;font-size:11px;">${p.date}</div><div>MA20: <strong>${p.v20.toFixed(1)}%</strong> · MA50: <strong>${p.v50.toFixed(1)}%</strong> · MA200: <strong>${p.v200.toFixed(1)}%</strong></div>`;
      const tw = tt.offsetWidth; let tx = Math.round(x - tw / 2);
      if (tx < 4) tx = 4; if (tx + tw > w - 4) tx = w - tw - 4;
      tt.style.left = tx + 'px'; tt.style.top = Math.max(4, P.t - 46) + 'px';
    } else tt.style.display = 'none';
  }
  let hi = -1; drw(-1);
  cv.onmousemove = function(e) { const cr = cv.getBoundingClientRect(), mx = e.clientX - cr.left; let cl = 0, md = Infinity; pts.forEach((_, i) => { const d = Math.abs(xp(i) - mx); if (d < md) { md = d; cl = i; } }); if (cl !== hi) { hi = cl; drw(cl); } };
  cv.onmouseleave = function() { if (hi !== -1) { hi = -1; drw(-1); } };
}

// --- History viewer ---
function buildHistorySection(){
  if (!SIGNALS_HISTORY || !SIGNALS_HISTORY.length) return '';
  let rows = [];
  SIGNALS_HISTORY.slice().reverse().forEach(day => {
    let signals = [];
    if (day.momentum && day.momentum.all_signals) {
      day.momentum.all_signals.forEach(s => { signals.push({symbol:s.symbol, source:'MOM', type:s.signal_type==='strong'?'Strong':'Watch', score:s.score}); });
    }
    if (day.strategy && day.strategy.all_signals) {
      day.strategy.all_signals.forEach(s => { signals.push({symbol:s.symbol, source:'PB', type:s.composite_score>=75?'Manh':'TB', score:s.composite_score}); });
    }
    if (day.ensemble && day.ensemble.all_signals) {
      day.ensemble.all_signals.forEach(s => { signals.push({symbol:s.symbol, source:'ENS', type:s.total_score>=0.65?'Strong':'Weak', score:Math.round(s.total_score*100)}); });
    }
    if (day.luc_mach && day.luc_mach.all_signals) {
      day.luc_mach.all_signals.forEach(s => {
        const type = s.status === 'STRONG_BUY' ? 'Strong' : s.status === 'VALID_BUY' ? 'Valid' : s.status === 'WATCHLIST' ? 'Watch' : 'Sell';
        signals.push({symbol:s.symbol, source:'LM', type:type, score:s.score});
      });
    }
    rows.push({date: day.date, signals});
  });
  if (!rows.length) return '';
  const fmt = (d) => { const p = d.split('/'); return p[0]+'/'+p[1]; };
  let tbody = rows.map(r => {
    let total = r.signals.length;
    let strong = r.signals.filter(s => s.type==='Strong'||s.type==='Manh').length;
    let detail = r.signals.map(s => `<tr><td>${s.symbol}</td><td>${s.source}</td><td>${s.type}</td><td>${s.score}</td></tr>`).join('');
    return `<tr onclick="toggleHistoryDetail(this)" style="cursor:pointer;">
      <td style="font-weight:600;">${fmt(r.date)}</td>
      <td>${total}</td>
      <td>${strong}</td>
      <td style="color:var(--muted);font-size:10px;">▼</td>
    </tr>
    <tr class="hist-detail" style="display:none;">
      <td colspan="4" style="padding:0;">
        <table style="margin:4px 0;font-size:11px;">
          <thead><tr><th>Ma</th><th>Nguon</th><th>Loai</th><th>Score</th></tr></thead>
          <tbody>${detail || '<tr><td colspan="4" style="text-align:center;color:var(--faint);">Khong co</td></tr>'}</tbody>
        </table>
      </td>
    </tr>`;
  }).join('');
  return `<div class="panel">
    <h2 class="accordion collapsed" onclick="toggleAccordion(this)">Lich su tin hieu</h2>
    <div class="accordion-body collapsed">
      <table>
        <thead><tr><th>Ngay</th><th>Tong</th><th>Manh</th><th></th></tr></thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>
  </div>`;
}
function toggleHistoryDetail(tr){
  let detail = tr.nextElementSibling;
  if (detail && detail.classList.contains('hist-detail')) {
    detail.style.display = detail.style.display === 'none' ? '' : 'none';
  }
}

// --- Appendix ---
function buildAppendixSection(m){
  if (!m) return '';
  const renderChips = (list, kind, dualSet) => {
    if (!list || !list.length) return '<span class="empty-note">Không có</span>';
    return list.map(s => {
      const isDual = dualSet && dualSet.has(s);
      const cls = isDual ? 'chip dual' : (kind === 'up' ? 'chip up' : kind === 'down' ? 'chip down' : 'chip');
      return `<span class="${cls}">${s}</span>`;
    }).join('');
  };
  const dualSet = new Set((m.above_ma20_symbols||[]).filter(x => (m.above_ma50_symbols||[]).includes(x)));

  return `<div class="panel">
    <h2 class="accordion collapsed" onclick="toggleAccordion(this)">Phụ lục — Mới vượt/rớt MA + Danh sách đầy đủ</h2>
    <div class="accordion-body collapsed">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
        <div><div style="font-size:11px;font-weight:600;color:var(--up);margin-bottom:4px;">↑ Mới vượt MA20 (${(m.newly_above_ma20||[]).length})</div>
          <div class="chip-wrap">${renderChips(m.newly_above_ma20, 'up')}</div></div>
        <div><div style="font-size:11px;font-weight:600;color:var(--down);margin-bottom:4px;">↓ Mới rớt MA20 (${(m.newly_below_ma20||[]).length})</div>
          <div class="chip-wrap">${renderChips(m.newly_below_ma20, 'down')}</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div><div style="font-size:11px;font-weight:600;color:var(--up);margin-bottom:4px;">↑ Mới vượt MA50 (${(m.newly_above_ma50||[]).length})</div>
          <div class="chip-wrap">${renderChips(m.newly_above_ma50, 'up')}</div></div>
        <div><div style="font-size:11px;font-weight:600;color:var(--down);margin-bottom:4px;">↓ Mới rớt MA50 (${(m.newly_below_ma50||[]).length})</div>
          <div class="chip-wrap">${renderChips(m.newly_below_ma50, 'down')}</div></div>
      </div>
      <div style="margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div><div style="font-size:11px;font-weight:600;margin-bottom:4px;">Trên MA20 (${(m.above_ma20_symbols||[]).length})</div>
          <div class="chip-wrap" style="max-height:120px;overflow-y:auto;">${renderChips(m.above_ma20_symbols, 'neutral', dualSet)}</div></div>
        <div><div style="font-size:11px;font-weight:600;margin-bottom:4px;">Trên MA50 (${(m.above_ma50_symbols||[]).length})</div>
          <div class="chip-wrap" style="max-height:120px;overflow-y:auto;">${renderChips(m.above_ma50_symbols, 'neutral', dualSet)}</div></div>
      </div>
      ${(m.volume_breakout_symbols||[]).length ? `
      <div style="margin-top:14px;"><div style="font-size:11px;font-weight:600;color:var(--up);margin-bottom:4px;">📊 Volume Breakout (${m.volume_breakout_symbols.length})</div>
        <div class="chip-wrap">${renderChips(m.volume_breakout_symbols, 'up')}</div></div>` : ''}
    </div>
  </div>`;
}

loadData();
</script>
</body>
</html>
