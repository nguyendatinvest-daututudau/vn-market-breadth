<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Độ rộng thị trường — TTCK Việt Nam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-a:#EEF3FF; --bg-b:#F3EEFF; --bg-c:#FFF6E9;
    --panel:#FFFFFF; --panel-tint:#F7F9FF; --border:#E4E9F7;
    --text:#1B2140; --muted:#6B7395; --faint:#9AA1C0;
    --up:#0FAE72;        /* tăng — xanh theo quy ước VN */
    --down:#F0473E;      /* giảm — đỏ theo quy ước VN */
    --neutral:#F5A524;
    --accent-1:#4F46E5; --accent-2:#06B6D4;
    --accent-grad: linear-gradient(120deg, var(--accent-1), var(--accent-2));
    --shadow-sm: 0 2px 10px rgba(31,41,102,0.06);
    --shadow-md: 0 10px 30px rgba(31,41,102,0.10);
    --font-display:'Sora',sans-serif; --font-mono:'JetBrains Mono',monospace; --font-body:'Inter',sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{color:var(--text); font-family:var(--font-body);}
  body{
    min-height:100vh; padding:24px clamp(16px,4vw,40px) 60px;
    background:
      radial-gradient(1100px 600px at 8% -10%, var(--bg-c) 0%, transparent 55%),
      radial-gradient(900px 600px at 100% 0%, var(--bg-b) 0%, transparent 50%),
      linear-gradient(180deg, var(--bg-a) 0%, #FBFCFF 60%);
    background-attachment:fixed;
  }
  .wrap{max-width:1120px; margin:0 auto;}
  header{display:flex; justify-content:space-between; align-items:flex-end; gap:16px; flex-wrap:wrap; margin-bottom:22px;}
  h1{font-family:var(--font-display); font-weight:700; font-size:clamp(20px,2.6vw,27px); letter-spacing:-0.01em; color:#141834;}
  .sub{font-family:var(--font-mono); font-size:11.5px; color:var(--muted); margin-top:6px;}

  .tabs{display:flex; gap:4px; background:var(--panel); border:1px solid var(--border); border-radius:999px; padding:5px; box-shadow:var(--shadow-sm);}
  .tabs button{
    font-family:var(--font-display); font-size:12.5px; font-weight:600; color:var(--muted);
    background:transparent; border:none; padding:9px 18px; border-radius:999px; cursor:pointer;
    transition:all .18s ease; letter-spacing:0.01em;
  }
  .tabs button:hover{color:var(--accent-1); background:var(--panel-tint);}
  .tabs button.active{
    background:var(--accent-grad); color:#fff;
    box-shadow:0 6px 16px rgba(79,70,229,0.35);
    transform:translateY(-1px);
  }

  .panel{background:var(--panel); border:1px solid var(--border); border-radius:18px; padding:22px; margin-bottom:18px; box-shadow:var(--shadow-sm);}
  .panel h2{font-family:var(--font-display); font-weight:600; font-size:13px; text-transform:uppercase; letter-spacing:0.06em; color:#3A4270; margin-bottom:16px;}

  .stat-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px;}
  .stat{border:1px solid var(--border); border-radius:14px; padding:16px; text-align:center; background:var(--panel-tint);}
  .stat .lab{font-size:12px; color:var(--muted); font-weight:600;}
  .stat .num{font-family:var(--font-mono); font-size:28px; font-weight:700; margin-top:7px;}
  .stat .pct{font-size:11.5px; color:var(--faint); margin-top:2px;}
  .stat.up{background:linear-gradient(180deg, rgba(16,185,129,0.08), rgba(16,185,129,0.03));}   /* Tăng = Xanh nhạt */
  .stat.down{background:linear-gradient(180deg, rgba(239,68,68,0.08), rgba(239,68,68,0.03));}   /* Giảm = Đỏ nhạt */
  .stat.flat{background:linear-gradient(180deg, rgba(245,158,11,0.08), rgba(245,158,11,0.03));} /* Không đổi = Vàng nhạt */

  .breadth-bar{display:flex; height:28px; border-radius:8px; overflow:hidden; margin:18px 0 8px; box-shadow:inset 0 0 0 1px var(--border);}
  .breadth-bar span{display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:11px; font-weight:700; color:#fff;}
  .bar-labels{display:flex; justify-content:space-between; font-family:var(--font-mono); font-size:11px; color:var(--muted);}
  .bar-labels .up-l{color:var(--up); font-weight:600;} .bar-labels .down-l{color:var(--down); font-weight:600;}

  .note{background:linear-gradient(90deg, rgba(79,70,229,0.06), rgba(6,182,212,0.05)); border-left:3px solid var(--accent-1); border-radius:8px; padding:13px 15px; font-size:13px; color:var(--muted); margin-top:16px; line-height:1.6;}
  .note b{color:var(--text);}

  .ma-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:14px;}
  .ma-stat{border:1px solid var(--border); border-radius:14px; padding:16px; text-align:center; background:var(--panel-tint);}
  .ma-stat .lab{font-size:12px; color:var(--muted); font-weight:600;}
  .ma-stat .num{font-family:var(--font-mono); font-size:25px; font-weight:700; margin-top:7px; color:var(--accent-1);}
  .ma-stat .sub2{font-size:11px; color:var(--faint); margin-top:3px;}

  table{width:100%; border-collapse:collapse; margin-top:6px;}
  th{text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:0.05em; color:var(--faint); font-family:var(--font-mono); font-weight:600; padding:10px 12px; border-bottom:2px solid var(--border);}
  td{padding:11px 12px; font-size:13px; border-bottom:1px solid var(--border);}
  tr:hover td{background:var(--panel-tint);}
  td.mono{font-family:var(--font-mono);}
  .up-txt{color:var(--up); font-weight:700;}
  .down-txt{color:var(--down); font-weight:700;}
  .tag{font-family:var(--font-display); font-size:10.5px; padding:4px 10px; border-radius:999px; font-weight:700;}
  .tag.weak{background:rgba(240,71,62,0.12); color:var(--down);}
  .tag.mixed{background:rgba(245,165,36,0.14); color:#B9760F;}
  .tag.good{background:rgba(15,174,114,0.12); color:var(--up);}

  footer{font-family:var(--font-mono); font-size:11px; color:var(--faint); text-align:center; margin-top:24px;}
  .loading, .err{font-family:var(--font-mono); font-size:13px; color:var(--muted); padding:30px; text-align:center;}

  .session-badge{display:inline-block; font-family:var(--font-mono); font-size:11px; padding:3px 10px; border-radius:999px; font-weight:600; margin-left:8px;}
  .session-badge.midday{background:rgba(245,165,36,0.14); color:#B9760F;}
  .session-badge.close{background:rgba(79,70,229,0.12); color:var(--accent-1);}
  .cmp-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px;}
  .cmp-card{border:1px solid var(--border); border-radius:14px; padding:14px; text-align:center; background:var(--panel-tint);}
  .cmp-card .lab{font-size:11px; color:var(--muted); font-weight:600;}
  .cmp-card .row{display:flex; justify-content:space-between; padding:6px 0; font-family:var(--font-mono); font-size:13px; border-bottom:1px solid var(--border);}
  .cmp-card .row:last-child{border-bottom:none;}
  .cmp-card .val{font-weight:700;}
  .delta{font-size:11px; font-weight:700; margin-left:6px;}
  .delta.up{color:var(--up);} .delta.down{color:var(--down);} .delta.flat{color:var(--neutral);}

  .signal-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px;}
  @media (max-width:800px){ .signal-grid{grid-template-columns:1fr 1fr;} }
  .signal-title{font-size:12px; font-weight:700; margin-bottom:9px;}
  .chip-wrap{display:flex; flex-wrap:wrap; gap:6px; max-height:180px; overflow-y:auto; padding-right:4px;}
  .chip{font-family:var(--font-mono); font-size:11px; background:var(--panel-tint); border:1px solid var(--border); border-radius:999px; padding:4px 10px; color:var(--muted); font-weight:500;}
  .chip.up{color:var(--up); border-color:rgba(240,71,62,0.25); background:rgba(240,71,62,0.07);}
  .chip.down{color:var(--down); border-color:rgba(15,174,114,0.25); background:rgba(15,174,114,0.07);}
  .chip.dual{background:linear-gradient(135deg,#c084fc,#d946ef);color:#fff;border-color:#d8b4fe;box-shadow:0 0 6px #c084fc;}
  .empty-note{font-size:12px; color:var(--faint); font-style:italic;}
  .commentary{font-size:14px;line-height:1.8;color:var(--text);padding:4px 0;}
  .commentary h1{font-size:20px;font-weight:700;margin:0 0 14px;color:#141834;}
  .commentary h2{font-size:16px;font-weight:600;margin:20px 0 10px;color:var(--accent-1);}
  .commentary h3{font-size:14px;font-weight:600;margin:16px 0 8px;color:var(--text);}
  .commentary strong{color:var(--text);}
  .commentary br{margin-bottom:6px;}
.chart-wrap{position:relative;width:100%;}
.chart-wrap canvas{width:100%;display:block;border-radius:12px;}
.chart-tooltip{position:absolute;pointer-events:none;z-index:50;background:rgba(255,255,255,0.97);border:1px solid var(--border);border-radius:10px;padding:9px 13px;font-size:11.5px;box-shadow:var(--shadow-md);font-family:var(--font-mono);display:none;white-space:nowrap;line-height:1.5;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Độ rộng thị trường chứng khoán Việt Nam</h1>
      <div class="sub" id="metaLine">Đang tải...</div>
    </div>
    <div class="tabs" id="tabs"></div>
  </header>

  <div id="content">
    <div class="loading">Đang tải dữ liệu…</div>
  </div>

  <footer>Dữ liệu: SSI FastConnect · Cập nhật tự động qua GitHub Actions</footer>
</div>

<script>
let MARKETS = ['ALL'];
let activeMarket = 'HOSE';
let LATEST = null, HISTORY = null, MIDDAY = null, COMMENTARY = null, SIGNALS = null;

async function loadData(){
  try {
    const timestamp = Date.now();
    const latestRes = await fetch(`./data/breadth_latest.json?t=${timestamp}`);
    if (!latestRes.ok) throw new Error('latest not found');
    LATEST = await latestRes.json();

    const historyRes = await fetch(`./data/breadth_history.json?t=${timestamp}`);
    HISTORY = historyRes.ok ? await historyRes.json() : [];

    const middayRes = await fetch(`./data/breadth_midday.json?t=${timestamp}`);
    MIDDAY = middayRes.ok ? await middayRes.json() : null;
    // Chỉ dùng midday nếu cùng ngày với latest
    if (MIDDAY && MIDDAY.markets.ALL.date !== LATEST.markets.ALL.date) {
      MIDDAY = null;
    }

    const commentaryRes = await fetch(`./data/market_commentary.json?t=${timestamp}`);
    COMMENTARY = commentaryRes.ok ? await commentaryRes.json() : null;

    const signalsRes = await fetch(`./data/strategy_signals.json?t=${timestamp}`);
    SIGNALS = signalsRes.ok ? await signalsRes.json() : null;

    const sessionLabel = LATEST.session === 'midday'
      ? '<span class="session-badge midday">Phiên sáng 11:30</span>'
      : '<span class="session-badge close">Đóng cửa 15:10</span>';
    document.getElementById('metaLine').innerHTML =
      `Cập nhật: ${new Date(LATEST.generated_at).toLocaleString('vi-VN')} · Ngày dữ liệu: ${LATEST.markets.ALL.date} ${sessionLabel}`;

    // Xác định danh sách market từ dữ liệu JSON (loại trừ ALL)
    MARKETS = ['ALL', ...Object.keys(LATEST.markets).filter(k => k !== 'ALL')];
    renderTabs();
    render();
  } catch (e) {
    console.error(e);
    document.getElementById('content').innerHTML = `
      <div class="err">
        ❌ Không tải được dữ liệu<br><br>
        Lỗi: ${e.message}<br><br>
        <small>Hãy thử Ctrl + Shift + R để refresh mạnh.</small>
      </div>`;
  }
}
function renderTabs(){
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  const tabs = [...MARKETS];
  if (SIGNALS) tabs.push('TIN_HIEU');
  if (COMMENTARY) tabs.push('NHAN_DINH');
  tabs.forEach(m => {
    const btn = document.createElement('button');
    const labels = { NHAN_DINH: 'Nhận định', TIN_HIEU: 'Pre-Breakout' };
    btn.textContent = labels[m] || m;
    if (m === activeMarket) btn.classList.add('active');
    btn.onclick = () => { activeMarket = m; renderTabs(); render(); };
    tabsEl.appendChild(btn);
  });
}

function fmt1(n){ return (n === null || n === undefined) ? '—' : Number(n).toFixed(1); }
function deltaStr(cur, prev, rev){
  if (cur === null || cur === undefined || prev === null || prev === undefined) return '';
  const d = cur - prev;
  if (Math.abs(d) < 0.01) return '<span class="delta flat">0</span>';
  const cls = rev ? (d < 0 ? 'up' : 'down') : (d > 0 ? 'up' : 'down');
  const sign = d > 0 ? '+' : '';
  return `<span class="delta ${cls}">${sign}${Number(d).toFixed(typeof d === 'number' && Number.isInteger(d) ? 0 : 2)}</span>`;
}

function renderChipsDual(list, otherList){
  const dual = new Set(otherList.filter(x => list.includes(x)));
  return renderChips(list, 'neutral', dual);
}

function renderChips(list, kind, dualSet){
  if (!list || list.length === 0) return '<span class="empty-note">Không có mã nào</span>';
  let cls;
  if (kind === 'up') cls = 'chip up';
  else if (kind === 'down') cls = 'chip down';
  else if (kind === 'dual') cls = 'chip dual';
  else cls = 'chip';
  return list.map(sym => {
    const isDual = dualSet && dualSet.has(sym);
    const finalCls = isDual ? 'chip dual' : cls;
    return `<span class="${finalCls}">${sym}</span>`;
  }).join('');
}

function cmpHTML(){
  if (!MIDDAY || LATEST.session !== 'close') return '';
  const mm = MIDDAY.markets[activeMarket];
  const m = LATEST.markets[activeMarket];
  if (!mm || !m || mm.date !== m.date) return '';
  const d = (v) => v === null || v === undefined ? 0 : v;
  const advDelta = d(m.advances) - d(mm.advances);
  const decDelta = d(m.declines) - d(mm.declines);
  const adDelta = d(m.ad_ratio) - d(mm.ad_ratio);
  const ma20Delta = d(m.pct_above_ma20) - d(mm.pct_above_ma20);
  const advCls = advDelta > 0 ? 'up' : advDelta < 0 ? 'down' : 'flat';
  const decCls = decDelta < 0 ? 'up' : decDelta > 0 ? 'down' : 'flat';
  const adCls = adDelta > 0 ? 'up' : adDelta < 0 ? 'down' : 'flat';
  const maCls = ma20Delta > 0 ? 'up' : ma20Delta < 0 ? 'down' : 'flat';
  return `<div class="panel">
    <h2>So sánh với phiên sáng — ${activeMarket}</h2>
    <div class="cmp-grid">
      <div class="cmp-card">
        <div class="lab">Tăng / Giảm</div>
        <div class="row"><span>11:30</span><span class="val">${mm.advances} / ${mm.declines}</span></div>
        <div class="row"><span>15:10</span><span class="val">${m.advances} / ${m.declines}</span></div>
        <div class="row"><span>Δ</span><span class="val"><span class="delta ${advCls}">${advDelta > 0 ? '+' : ''}${advDelta}</span> / <span class="delta ${decCls}">${decDelta > 0 ? '+' : ''}${decDelta}</span></span></div>
      </div>
      <div class="cmp-card">
        <div class="lab">A/D Ratio</div>
        <div class="row"><span>11:30</span><span class="val">${fmt1(mm.ad_ratio)}</span></div>
        <div class="row"><span>15:10</span><span class="val">${fmt1(m.ad_ratio)}</span></div>
        <div class="row"><span>Δ</span><span class="val"><span class="delta ${adCls}">${adDelta > 0 ? '+' : ''}${fmt1(adDelta)}</span></span></div>
      </div>
      <div class="cmp-card">
        <div class="lab">% trên MA20</div>
        <div class="row"><span>11:30</span><span class="val">${fmt1(mm.pct_above_ma20)}%</span></div>
        <div class="row"><span>15:10</span><span class="val">${fmt1(m.pct_above_ma20)}%</span></div>
        <div class="row"><span>Δ</span><span class="val"><span class="delta ${maCls}">${ma20Delta > 0 ? '+' : ''}${fmt1(ma20Delta)}%</span></span></div>
      </div>
    </div>
  </div>`;
}

function render(){
  if (activeMarket === 'NHAN_DINH') {
    renderCommentary();
    return;
  }
  if (activeMarket === 'TIN_HIEU') {
    renderSignals();
    return;
  }
  const m = LATEST.markets[activeMarket];
  const contentEl = document.getElementById('content');

  const total = m.total_symbols || 0;
  const upW = total ? (m.advances_pct) : 0;
  const flatW = total ? (m.unchanged_pct) : 0;
  const downW = total ? (m.declines_pct) : 0;

  const hist = (HISTORY || []).slice(-6).reverse();

  contentEl.innerHTML = `
    <div class="panel">
      <h2>Phân bố tăng-giảm giá — ${total} mã ${activeMarket} (${m.date})</h2>
      <div class="stat-grid">
        <div class="stat up"><div class="lab">Tăng giá</div><div class="num">${m.advances}</div><div class="pct">${fmt1(m.advances_pct)}%</div></div>
        <div class="stat flat"><div class="lab">Không đổi</div><div class="num">${m.unchanged}</div><div class="pct">${fmt1(m.unchanged_pct)}%</div></div>
        <div class="stat down"><div class="lab">Giảm giá</div><div class="num">${m.declines}</div><div class="pct">${fmt1(m.declines_pct)}%</div></div>
      </div>
      <div class="bar-labels" style="margin-top:16px;">
        <span class="up-l">Tăng: ${m.advances} (${fmt1(m.advances_pct)}%)</span>
        <span>Không đổi: ${m.unchanged}</span>
        <span class="down-l">Giảm: ${m.declines} (${fmt1(m.declines_pct)}%)</span>
      </div>
      <div class="breadth-bar">
        <span style="width:${upW}%; background:var(--up);"></span>
        <span style="width:${flatW}%; background:var(--neutral);"></span>
        <span style="width:${downW}%; background:var(--down);"></span>
      </div>
      <div class="note">
        <b>A/D Ratio: ${m.ad_ratio ?? '—'}</b> — tỉ lệ số mã tăng trên số mã giảm phiên ${m.date}.
        ${m.ad_ratio !== null && m.ad_ratio > 1 ? 'Số mã tăng đang vượt số mã giảm.' : m.ad_ratio !== null ? 'Số mã giảm đang chiếm ưu thế.' : ''}
      </div>
    </div>

    ${cmpHTML()}

    <div class="panel">
      <h2>% cổ phiếu ${activeMarket} trên đường trung bình — so sánh các mốc</h2>
      <div class="ma-grid">
        <div class="ma-stat"><div class="lab">Trên MA20 (ngắn hạn)</div><div class="num">${fmt1(m.pct_above_ma20)}%</div><div class="sub2">${m.above_ma20_count} / ${m.ma_total_symbols} mã</div></div>
        <div class="ma-stat"><div class="lab">Trên MA50 (trung hạn)</div><div class="num">${fmt1(m.pct_above_ma50)}%</div><div class="sub2">${m.above_ma50_count} / ${m.ma_total_symbols} mã</div></div>
        <div class="ma-stat"><div class="lab">Trên MA200 (dài hạn)</div><div class="num">${fmt1(m.pct_above_ma200)}%</div><div class="sub2">${m.above_ma200_count} / ${m.ma_total_symbols} mã</div></div>
      </div>
    </div>

    <div class="panel">
      <h2>Lịch sử % cổ phiếu trên đường trung bình — ${activeMarket}</h2>
      <div class="chart-wrap" id="chartWrap">
        <canvas id="breadthChart"></canvas>
        <div class="chart-tooltip" id="chartTooltip"></div>
      </div>
    </div>

    <div class="panel">
      <h2>Chuỗi độ rộng thị trường ${activeMarket} — các phiên gần nhất</h2>
      <table>
        <thead><tr><th>Phiên</th><th>Tăng</th><th>Giảm</th><th>A/D Ratio</th><th>Nhận xét</th></tr></thead>
        <tbody>
          ${hist.map(h => {
            const row = h.markets[activeMarket];
            if (!row) return '';
            const ratio = row.ad_ratio;
            let tagClass = 'mixed', tagText = 'Trung tính';
            if (ratio !== null) {
              if (ratio >= 1.2) { tagClass = 'good'; tagText = 'Tích cực'; }
              else if (ratio <= 0.8) { tagClass = 'weak'; tagText = 'Yếu'; }
            }
            return `<tr>
              <td>${row.date}</td>
              <td class="mono up-txt">${row.advances}</td>
              <td class="mono down-txt">${row.declines}</td>
              <td class="mono">${ratio ?? '—'}</td>
              <td><span class="tag ${tagClass}">${tagText}</span></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    <div class="panel">
      <h2>Mã cổ phiếu vừa chuyển tín hiệu — ${activeMarket} (${m.date})</h2>
      <div class="signal-grid">
        <div class="signal-col">
          <div class="signal-title up-txt">↑ Vừa vượt lên MA20 (${(m.newly_above_ma20||[]).length})</div>
          <div class="chip-wrap">${renderChips(m.newly_above_ma20, 'up')}</div>
        </div>
        <div class="signal-col">
          <div class="signal-title down-txt">↓ Vừa rớt xuống MA20 (${(m.newly_below_ma20||[]).length})</div>
          <div class="chip-wrap">${renderChips(m.newly_below_ma20, 'down')}</div>
        </div>
        <div class="signal-col">
          <div class="signal-title up-txt">↑ Vừa vượt lên MA50 (${(m.newly_above_ma50||[]).length})</div>
          <div class="chip-wrap">${renderChips(m.newly_above_ma50, 'up')}</div>
        </div>
        <div class="signal-col">
          <div class="signal-title down-txt">↓ Vừa rớt xuống MA50 (${(m.newly_below_ma50||[]).length})</div>
          <div class="chip-wrap">${renderChips(m.newly_below_ma50, 'down')}</div>
        </div>
      </div>
      <div class="note" style="margin-top:14px;">
        "Vừa vượt lên/rớt xuống" nghĩa là mã đó <b>mới đổi trạng thái so với phiên trước</b> — hôm qua còn ở dưới đường MA, hôm nay đã lên trên (hoặc ngược lại). Đây là tín hiệu sớm cho thấy dòng tiền đang cải thiện hoặc suy yếu ở mã đó.
      </div>
    </div>

    <div class="panel">
      <h2>Toàn bộ mã đang trên MA20 / MA50 — ${activeMarket}</h2>
      <div class="signal-grid" style="grid-template-columns:1fr 1fr;">
        <div class="signal-col">
          <div class="signal-title">Trên MA20 (${(m.above_ma20_symbols||[]).length} mã)</div>
          <div class="chip-wrap">${renderChipsDual(m.above_ma20_symbols, m.above_ma50_symbols)}</div>
        </div>
        <div class="signal-col">
          <div class="signal-title">Trên MA50 (${(m.above_ma50_symbols||[]).length} mã)</div>
          <div class="chip-wrap">${renderChipsDual(m.above_ma50_symbols, m.above_ma20_symbols)}</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>Breakout volume — ${activeMarket} (${m.date})</h2>
      <div class="note" style="margin-bottom:12px;">
        Mã ≥ MA20 và khối lượng vượt ngưỡng: ${LATEST.session === 'midday' ? '50%' : '130%'} trung bình 20 phiên.
        Hiện có <b>${m.volume_breakout_count || 0}</b> mã.
      </div>
      <div class="signal-grid" style="grid-template-columns:1fr;">
        <div class="signal-col">
          <div class="chip-wrap">${renderChips(m.volume_breakout_symbols, 'up')}</div>
        </div>
      </div>
    </div>
  `;
  requestAnimationFrame(renderBreadthChart);
}
function renderBreadthChart(){
  const cv=document.getElementById('breadthChart'),tt=document.getElementById('chartTooltip'),wr=document.getElementById('chartWrap');
  if(!cv||!tt||!wr)return;
  const pts=((HISTORY||[]).map(h=>{const m=h.markets[activeMarket];return m&&m.pct_above_ma20!=null?{date:h.date,v20:m.pct_above_ma20,v50:m.pct_above_ma50,v200:m.pct_above_ma200}:null;}).filter(Boolean));
  if(pts.length<2){wr.innerHTML='<div style="padding:60px 20px;text-align:center;color:var(--faint);font-size:13px;">Chưa đủ dữ liệu lịch sử để vẽ biểu đồ.</div>';return;}
  pts.sort((a,b)=>{const da=a.date.split('/'),db=b.date.split('/');return da[2]-db[2]||da[1]-db[1]||da[0]-db[0];});
  const dpr=window.devicePixelRatio||1,w=wr.clientWidth,h=300;
  cv.width=w*dpr;cv.height=h*dpr;cv.style.width=w+'px';cv.style.height=h+'px';
  const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
  const P={t:34,r:16,b:42,l:50},cw=w-P.l-P.r,ch=h-P.t-P.b;
  const xp=i=>P.l+(i/(pts.length-1))*cw,yp=v=>P.t+ch-(v/100)*ch;
  const lines=[{k:'v20',c:'#4F46E5',l:'MA20'},{k:'v50',c:'#F5A524',l:'MA50'},{k:'v200',c:'#06B6D4',l:'MA200'}];

  function drw(idx){
    ctx.clearRect(0,0,w,h);
    [0,25,50,75,100].forEach(pct=>{
      const y=yp(pct);
      ctx.save();ctx.strokeStyle='#E4E9F7';ctx.lineWidth=1;ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(w-P.r,y);ctx.stroke();ctx.restore();
      ctx.fillStyle='#6B7395';ctx.font='10px JetBrains Mono,monospace';
      ctx.textAlign='right';ctx.textBaseline='middle';ctx.fillText(pct+'%',P.l-8,y);
    });
    lines.forEach(s=>{
      ctx.strokeStyle=s.c;ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';
      ctx.beginPath();pts.forEach((p,i)=>{const x=xp(i),y=yp(p[s.k]);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
      ctx.stroke();
      const lx=xp(pts.length-1),ly=yp(pts[pts.length-1][s.k]);
      ctx.fillStyle='#fff';ctx.strokeStyle=s.c;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(lx,ly,4,0,Math.PI*2);ctx.fill();ctx.stroke();
    });
    ctx.fillStyle='#6B7395';ctx.font='9.5px JetBrains Mono,monospace';
    ctx.textAlign='center';ctx.textBaseline='top';
    const step=Math.max(1,Math.floor(pts.length/Math.max(1,Math.floor(cw/55))));
    pts.forEach((p,i)=>{if(i%step===0||i===pts.length-1){const d=p.date.split('/');ctx.fillText(d[0]+'/'+d[1],xp(i),h-P.b+10);}});
    ctx.strokeStyle='#E4E9F7';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(P.l,h-P.b);ctx.lineTo(w-P.r,h-P.b);ctx.stroke();
    lines.forEach((s,i)=>{
      const lx=P.l+i*110,ly=16;
      ctx.strokeStyle=s.c;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx+20,ly);ctx.stroke();
      ctx.fillStyle=s.c;ctx.beginPath();ctx.arc(lx+10,ly,3.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#3A4270';ctx.font='11px Inter,sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(s.l,lx+28,ly);
    });
    if(idx>=0&&idx<pts.length){
      const p=pts[idx],x=xp(idx);
      ctx.save();ctx.strokeStyle='rgba(27,33,64,0.18)';ctx.lineWidth=1;ctx.setLineDash([3,4]);
      ctx.beginPath();ctx.moveTo(x,P.t);ctx.lineTo(x,P.t+ch);ctx.stroke();ctx.restore();
      lines.forEach(s=>{const dy=yp(p[s.k]);ctx.fillStyle='#fff';ctx.strokeStyle=s.c;ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(x,dy,5,0,Math.PI*2);ctx.fill();ctx.stroke();});
      tt.style.display='block';
      tt.innerHTML=`<div style="font-weight:700;margin-bottom:5px;color:#1B2140;font-size:12px;font-family:Inter,sans-serif;">${p.date}</div><div style="display:flex;gap:16px;"><span><span style="color:#4F46E5;font-weight:700;">●</span> MA20: <strong>${p.v20.toFixed(1)}%</strong></span><span><span style="color:#F5A524;font-weight:700;">●</span> MA50: <strong>${p.v50.toFixed(1)}%</strong></span><span><span style="color:#06B6D4;font-weight:700;">●</span> MA200: <strong>${p.v200.toFixed(1)}%</strong></span></div>`;
      const tw=tt.offsetWidth;let tx=Math.round(x-tw/2);
      if(tx<4)tx=4;if(tx+tw>w-4)tx=w-tw-4;
      tt.style.left=tx+'px';tt.style.top=Math.max(4,P.t-52)+'px';
    }else tt.style.display='none';
  }
  let hi=-1;drw(-1);
  cv.onmousemove=function(e){const cr=cv.getBoundingClientRect(),mx=e.clientX-cr.left;let cl=0,md=Infinity;pts.forEach((_,i)=>{const d=Math.abs(xp(i)-mx);if(d<md){md=d;cl=i;}});if(cl!==hi){hi=cl;drw(cl);}};
  cv.onmouseleave=function(){if(hi!==-1){hi=-1;drw(-1);}};
}
let _crt;
window.addEventListener('resize',()=>{clearTimeout(_crt);_crt=setTimeout(renderBreadthChart,150);});

function renderSignals(){
  const el = document.getElementById('content');
  if (!SIGNALS || !SIGNALS.all_signals) {
    el.innerHTML = `<div class="panel"><h2>Pre-Breakout Signals</h2><div class="loading">Chưa có dữ liệu tín hiệu.</div></div>`;
    return;
  }
  const s = SIGNALS;
  const all = s.all_signals || [];
  const tbody = all.map(row => {
    const cls = row.composite_score >= 75 ? 'good' : row.composite_score >= 60 ? 'mixed' : 'weak';
    const label = row.composite_score >= 75 ? 'Mạnh' : row.composite_score >= 60 ? 'TB' : 'Yếu';
    return `<tr>
      <td class="mono" style="font-weight:700;">${row.symbol}</td>
      <td class="mono">${row.composite_score.toFixed(1)}</td>
      <td class="mono">${row.base_score.toFixed(1)}</td>
      <td class="mono">${(row.mf_score || 0).toFixed(1)}</td>
      <td class="mono">${(row.vol_gradient || 0) > 0 ? '+' : ''}${(row.vol_gradient || 0).toFixed(2)}</td>
      <td class="mono">${row.vol_ratio !== null ? row.vol_ratio.toFixed(2) : '—'}</td>
      <td class="mono">${(row.last_price || 0).toLocaleString('vi-VN')}</td>
      <td><span class="tag ${cls}">${label}</span></td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div class="panel">
      <h2>Pre-Breakout Signals — ${s.date}</h2>
      <div style="display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap;">
        <div class="stat good" style="flex:1;min-width:120px;">
          <div class="lab">Mạnh (≥75)</div>
          <div class="num" style="font-size:22px;">${s.strong_signals}</div>
        </div>
        <div class="stat flat" style="flex:1;min-width:120px;">
          <div class="lab">TB (60-74)</div>
          <div class="num" style="font-size:22px;">${s.moderate_signals}</div>
        </div>
        <div class="stat down" style="flex:1;min-width:120px;">
          <div class="lab">Yếu (50-59)</div>
          <div class="num" style="font-size:22px;">${s.weak_signals}</div>
        </div>
        <div style="flex:1;min-width:120px;border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;background:var(--panel-tint);">
          <div class="lab">Tổng tín hiệu</div>
          <div class="num" style="font-size:22px;color:var(--accent-1);">${s.total_signals}</div>
          <div class="sub2" style="font-size:11px;color:var(--faint);margin-top:3px;">/${s.total_symbols_analyzed} mã</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>Danh sách tín hiệu — <span style="color:var(--accent-1);font-weight:700;">${all.length} mã</span> xếp hạng theo Composite Score</h2>
      <div class="note" style="margin-bottom:14px;">
        <b>Composite Score</b> = 40% Base + 30% Money Flow + 30% Vol Gradient.
        Base: accumulation base detection (range + higher lows + volume dry-up).
        Money Flow: OBV slope normalized.
        Vol Gradient: tốc độ co hẹp của biến động ngắn hạn.
      </div>
      <table>
        <thead><tr>
          <th>Mã</th>
          <th>Score</th>
          <th>Base</th>
          <th>MF</th>
          <th>Grad</th>
          <th>VolRatio</th>
          <th>Giá</th>
          <th>Mức</th>
        </tr></thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>

    <div class="panel">
      <h2>Chi tiết theo mức — Pre-Breakout</h2>
      <div class="signal-grid">
        <div class="signal-col">
          <div class="signal-title up-txt">Mạnh — ${s.strong_signals} mã</div>
          <div class="chip-wrap">${renderChips(s.strong.map(r => r.symbol), 'up')}</div>
        </div>
        <div class="signal-col">
          <div class="signal-title" style="color:#B9760F;">Trung bình — ${s.moderate_signals} mã</div>
          <div class="chip-wrap">${renderChips(s.moderate.map(r => r.symbol))}</div>
        </div>
        <div class="signal-col">
          <div class="signal-title down-txt">Yếu — ${s.weak_signals} mã</div>
          <div class="chip-wrap">${renderChips(s.weak.map(r => r.symbol), 'down')}</div>
        </div>
      </div>
    </div>
  `;
}

function renderCommentary(){
  const contentEl = document.getElementById('content');
  if (!COMMENTARY || !COMMENTARY.content) {
    contentEl.innerHTML = `<div class="panel"><h2>Nhận định phiên</h2><div class="loading">Chưa có dữ liệu nhận định.</div></div>`;
    return;
  }
  const md = COMMENTARY.content;
  // Simple markdown to HTML for basic formatting
  const html = md
    .replace(/^### (.*$)/gm, '<h3>$1</h3>')
    .replace(/^## (.*$)/gm, '<h2>$1</h2>')
    .replace(/^# (.*$)/gm, '<h1>$1</h1>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
  contentEl.innerHTML = `<div class="panel"><h2>Nhận định phiên</h2><div class="commentary">${html}</div></div>`;
}

loadData();
</script>
