<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Độ rộng thị trường — TTCK Việt Nam</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0f0a1f;
    --panel: #1a1433;
    --panel-alt: #221c45;
    --border: #3b2e7a;
    --text: #e0d9ff;
    --muted: #9b8cff;
    --accent: #8b5cf6;
    --up: #22c55e;
    --down: #ef4444;
    --neutral: #eab308;
  }
  *{margin:0; padding:0; box-sizing:border-box;}
  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 20px;
  }
  .wrap{max-width: 1200px; margin: 0 auto;}
  h1{
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(90deg, #c4b5fd, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .sub{font-size: 13px; color: var(--muted); margin-top: 4px;}

  .header{
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .tabs{
    display: flex;
    background: var(--panel-alt);
    border-radius: 12px;
    padding: 6px;
    gap: 4px;
  }
  .tabs button{
    padding: 10px 20px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .tabs button.active{
    background: var(--accent);
    color: white;
    box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
  }

  .panel{
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }

  .stat-grid{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    margin-top: 16px;
  }
  .stat{
    background: var(--panel-alt);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .stat .num{
    font-size: 32px;
    font-weight: 700;
    margin: 8px 0;
  }
  .stat.up .num { color: var(--up); }
  .stat.down .num { color: var(--down); }

  .ma-grid{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px;
  }
  .ma-stat{
    background: var(--panel-alt);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
  }

  table{
    width: 100%;
    border-collapse: collapse;
    margin-top: 12px;
  }
  th{
    text-align: left;
    padding: 12px 10px;
    font-size: 12px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  td{
    padding: 12px 10px;
    border-bottom: 1px solid var(--border);
  }
  .up-txt{color: var(--up);}
  .down-txt{color: var(--down);}

  .loading, .err{
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 15px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <h1>Độ rộng thị trường chứng khoán Việt Nam</h1>
      <div class="sub" id="metaLine">Đang tải...</div>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>

  <div id="content">
    <div class="loading">Đang tải dữ liệu...</div>
  </div>
</div>

<script>
const MARKETS = ['ALL','HOSE','HNX','UPCOM'];
let activeMarket = 'HOSE';
let LATEST = null, HISTORY = null;

async function loadData(){
  try {
    const latestRes = await fetch('https://raw.githubusercontent.com/0deathislife0-design/vn-market-breadth/main/data/breadth_latest.json');
    LATEST = await latestRes.json();

    const historyRes = await fetch('https://raw.githubusercontent.com/0deathislife0-design/vn-market-breadth/main/data/breadth_history.json');
    HISTORY = historyRes.ok ? await historyRes.json() : [];

    document.getElementById('metaLine').textContent = 
      `Cập nhật: ${new Date(LATEST.generated_at).toLocaleString('vi-VN')}`;

    renderTabs();
    render();
  } catch(e){
    document.getElementById('content').innerHTML = `<div class="err">Lỗi tải dữ liệu: ${e.message}</div>`;
  }
}

function renderTabs(){
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  MARKETS.forEach(m => {
    const btn = document.createElement('button');
    btn.textContent = m;
    if(m === activeMarket) btn.classList.add('active');
    btn.onclick = () => { activeMarket = m; renderTabs(); render(); };
    el.appendChild(btn);
  });
}

function fmt1(n){ return (n === null || n === undefined) ? '—' : Number(n).toFixed(1); }

function render(){
  const m = LATEST.markets[activeMarket];
  const content = document.getElementById('content');

  content.innerHTML = `
    <div class="panel">
      <h2>Phân bố Tăng - Giảm - Không đổi — ${m.total_symbols} mã ${activeMarket}</h2>
      <div class="stat-grid">
        <div class="stat up">
          <div>Tăng giá</div>
          <div class="num">${m.advances}</div>
          <div>${fmt1(m.advances_pct)}%</div>
        </div>
        <div class="stat">
          <div>Không đổi</div>
          <div class="num">${m.unchanged}</div>
          <div>${fmt1(m.unchanged_pct)}%</div>
        </div>
        <div class="stat down">
          <div>Giảm giá</div>
          <div class="num">${m.declines}</div>
          <div>${fmt1(m.declines_pct)}%</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2>% cổ phiếu trên đường trung bình</h2>
      <div class="ma-grid">
        <div class="ma-stat">
          <div>Trên MA20 (ngắn hạn)</div>
          <div class="num">${fmt1(m.pct_above_ma20)}%</div>
          <div>${m.above_ma20_count} / ${m.ma_total_symbols} mã</div>
        </div>
        <div class="ma-stat">
          <div>Trên MA50 (trung hạn)</div>
          <div class="num">${fmt1(m.pct_above_ma50)}%</div>
          <div>${m.above_ma50_count} / ${m.ma_total_symbols} mã</div>
        </div>
        <div class="ma-stat">
          <div>Trên MA200 (dài hạn)</div>
          <div class="num">${fmt1(m.pct_above_ma200)}%</div>
          <div>${m.above_ma200_count} / ${m.ma_total_symbols} mã</div>
        </div>
      </div>
    </div>
  `;
}

loadData();
</script>
</body>
</html>
