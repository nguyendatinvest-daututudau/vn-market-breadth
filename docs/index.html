<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Độ rộng thị trường — TTCK Việt Nam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0D12; --panel:#12161D; --panel-alt:#171C24; --border:#232935;
    --text:#EDEFF2; --muted:#8A93A3; --faint:#545D6C;
    --up:#22c55e; --down:#ef4444; --neutral:#eab308;
    --font-display:'Space Grotesk',sans-serif; --font-mono:'JetBrains Mono',monospace; --font-body:'Inter',sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg); color:var(--text); font-family:var(--font-body);}
  body{min-height:100vh; padding:20px clamp(16px,4vw,40px) 60px;}
  .wrap{max-width:1100px; margin:0 auto;}
  header{display:flex; justify-content:space-between; align-items:flex-end; gap:16px; flex-wrap:wrap; margin-bottom:18px;}
  h1{font-family:var(--font-display); font-size:clamp(18px,2.4vw,24px);}
  .sub{font-family:var(--font-mono); font-size:11.5px; color:var(--faint); margin-top:4px;}

  .tabs{display:flex; gap:2px; background:var(--panel-alt); border:1px solid var(--border); border-radius:8px; padding:3px;}
  .tabs button{font-family:var(--font-mono); font-size:12px; font-weight:600; color:var(--muted); background:transparent; border:none; padding:7px 13px; border-radius:6px; cursor:pointer;}
  .tabs button.active{background:var(--neutral); color:#0A0D12;}

  .panel{background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:18px; margin-bottom:18px;}
  .panel h2{font-family:var(--font-mono); font-size:12px; text-transform:uppercase; letter-spacing:0.06em; color:var(--faint); margin-bottom:14px;}

  .stat-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:12px;}
  .stat{background:var(--panel-alt); border:1px solid var(--border); border-radius:10px; padding:14px; text-align:center;}
  .stat .lab{font-size:12px; color:var(--muted);}
  .stat .num{font-family:var(--font-mono); font-size:26px; font-weight:700; margin-top:6px;}
  .stat .pct{font-size:11.5px; color:var(--faint); margin-top:2px;}
  .stat.up .num{color:var(--up);}
  .stat.down .num{color:var(--down);}
  .stat.flat .num{color:var(--neutral);}

  .ma-grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(300px,1fr)); gap:16px;}
  .ma-stat{background:var(--panel-alt); border:1px solid var(--border); border-radius:10px; padding:16px; text-align:center; position:relative;}
  .ma-stat .btn-detail{
    margin-top:8px;
    padding:6px 12px;
    font-size:11px;
    background:var(--accent,#8b5cf6);
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
  }

  table{width:100%; border-collapse:collapse; margin-top:6px;}
  th,td{padding:9px 10px; border-bottom:1px solid var(--border);}
  th{font-size:10.5px; text-transform:uppercase; color:var(--faint); font-family:var(--font-mono);}
  .up-txt{color:var(--up); font-weight:600;}
  .down-txt{color:var(--down); font-weight:600;}

  /* Modal */
  .modal{
    display:none; position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center;
  }
  .modal-content{
    background:var(--panel); width:90%; max-width:700px; border-radius:12px;
    max-height:85vh; overflow:auto; border:1px solid var(--border);
  }
  .modal-header{
    padding:16px 20px; border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center;
  }
  .modal-body{padding:20px;}
  .close-btn{cursor:pointer; font-size:24px; color:var(--muted);}

  .loading, .err {padding:50px 20px; text-align:center; color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Độ rộng thị trường chứng khoán Việt Nam</h1>
      <div class="sub" id="metaLine">Đang tải...</div>
    </div>
    <div class="tabs" id="tabs"></div>
  </header>

  <div id="content">
    <div class="loading">Đang tải dữ liệu...</div>
  </div>
</div>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <span class="close-btn" onclick="closeModal()">×</span>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const MARKETS = ['ALL','HOSE','HNX','UPCOM'];
let activeMarket = 'HOSE';
let LATEST = null, HISTORY = null;

function setProgress(p) {
  // Nếu có thanh progress thì cập nhật
}

async function loadData(){
  try {
    const latestRes = await fetch('https://raw.githubusercontent.com/0deathislife0-design/vn-market-breadth/main/data/breadth_latest.json');
    if (!latestRes.ok) throw new Error('latest not found');
    LATEST = await latestRes.json();

    const historyRes = await fetch('https://raw.githubusercontent.com/0deathislife0-design/vn-market-breadth/main/data/breadth_history.json');
    HISTORY = historyRes.ok ? await historyRes.json() : [];

    document.getElementById('metaLine').textContent =
      `Cập nhật: ${new Date(LATEST.generated_at).toLocaleString('vi-VN')} · Ngày dữ liệu: ${LATEST.markets.ALL.date}`;

    renderTabs();
    render();
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="err">Lỗi: ${e.message}</div>`;
  }
}

function renderTabs(){
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  MARKETS.forEach(m => {
    const btn = document.createElement('button');
    btn.textContent = m;
    if (m === activeMarket) btn.classList.add('active');
    btn.onclick = () => { activeMarket = m; renderTabs(); render(); };
    tabsEl.appendChild(btn);
  });
}

function fmt1(n){ return (n === null || n === undefined) ? '—' : Number(n).toFixed(1); }

function showStockList(title, stocks) {
  document.getElementById('modal-title').textContent = title;
  const body = document.getElementById('modal-body');
  body.innerHTML = stocks.length ? 
    `<div style="max-height:500px; overflow:auto;">${stocks.map(s => `<div style="padding:8px 0; border-bottom:1px solid #333;">${s}</div>`).join('')}</div>` :
    '<p>Không có dữ liệu</p>';
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

function render(){
  const m = LATEST.markets[activeMarket];
  const contentEl = document.getElementById('content');

  contentEl.innerHTML = `
    <div class="panel">
      <h2>Phân bố tăng-giảm giá — ${m.total_symbols} mã ${activeMarket} (${m.date})</h2>
      <div class="stat-grid">
        <div class="stat up"><div class="lab">Tăng giá</div><div class="num">${m.advances}</div><div class="pct">${fmt1(m.advances_pct)}%</div></div>
        <div class="stat flat"><div class="lab">Không đổi</div><div class="num">${m.unchanged}</div><div class="pct">${fmt1(m.unchanged_pct)}%</div></div>
        <div class="stat down"><div class="lab">Giảm giá</div><div class="num">${m.declines}</div><div class="pct">${fmt1(m.declines_pct)}%</div></div>
      </div>
    </div>

    <div class="panel">
      <h2>% cổ phiếu ${activeMarket} trên đường trung bình</h2>
      <div class="ma-grid">
        <div class="ma-stat">
          <div class="lab">Trên MA20 (ngắn hạn)</div>
          <div class="num">${fmt1(m.pct_above_ma20)}%</div>
          <div class="sub2">${m.above_ma20_count} / ${m.ma_total_symbols} mã</div>
          <button class="btn-detail" onclick="showStockList('Danh sách mã trên MA20', ${JSON.stringify(m.above_ma20_symbols || [])})">Xem danh sách</button>
        </div>
        <div class="ma-stat">
          <div class="lab">Trên MA50 (trung hạn)</div>
          <div class="num">${fmt1(m.pct_above_ma50)}%</div>
          <div class="sub2">${m.above_ma50_count} / ${m.ma_total_symbols} mã</div>
          <button class="btn-detail" onclick="showStockList('Danh sách mã trên MA50', ${JSON.stringify(m.above_ma50_symbols || [])})">Xem danh sách</button>
        </div>
        <div class="ma-stat">
          <div class="lab">Trên MA200 (dài hạn)</div>
          <div class="num">${fmt1(m.pct_above_ma200)}%</div>
          <div class="sub2">${m.above_ma200_count} / ${m.ma_total_symbols} mã</div>
          <button class="btn-detail" onclick="showStockList('Danh sách mã trên MA200', ${JSON.stringify(m.above_ma200_symbols || [])})">Xem danh sách</button>
        </div>
      </div>
    </div>
  `;
}

loadData();
</script>
</body>
</html>
